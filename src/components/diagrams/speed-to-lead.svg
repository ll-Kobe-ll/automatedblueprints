<svg viewBox="0 0 400 332" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Speed to lead workflow: form submitted, instant text and email to the lead plus an alert to your phone, first responder wins the job." font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="ah2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0 0L8 4L0 8z" fill="#f5f3ec"/></marker>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#27345c" stroke-width="1"/></pattern>
  </defs>
  <rect width="400" height="332" rx="12" fill="#1a2440"/>
  <rect width="400" height="332" rx="12" fill="url(#grid2)"/>
  <rect x="50" y="24" width="300" height="48" rx="8" fill="#22305a" stroke="#f5f3ec" stroke-width="1.5"/>
  <text x="200" y="53" text-anchor="middle" fill="#f5f3ec" font-size="14" font-weight="600">Lead submits a form</text>
  <line x1="170" y1="78" x2="110" y2="132" stroke="#f5f3ec" stroke-width="1.5" marker-end="url(#ah2)"/>
  <line x1="230" y1="78" x2="290" y2="132" stroke="#f5f3ec" stroke-width="1.5" marker-end="url(#ah2)"/>
  <text x="200" y="110" text-anchor="middle" fill="#3ec97e" font-size="12" font-weight="700">instantly</text>
  <rect x="16" y="140" width="176" height="56" rx="8" fill="#22305a" stroke="#f5f3ec" stroke-width="1.5"/>
  <text x="104" y="163" text-anchor="middle" fill="#f5f3ec" font-size="13" font-weight="600"><tspan x="104" dy="0">Instant text + email</tspan><tspan x="104" dy="17">to the lead</tspan></text>
  <rect x="208" y="140" width="176" height="56" rx="8" fill="#22305a" stroke="#f5f3ec" stroke-width="1.5"/>
  <text x="296" y="163" text-anchor="middle" fill="#f5f3ec" font-size="13" font-weight="600"><tspan x="296" dy="0">Alert hits</tspan><tspan x="296" dy="17">your phone</tspan></text>
  <line x1="104" y1="202" x2="170" y2="252" stroke="#f5f3ec" stroke-width="1.5" marker-end="url(#ah2)"/>
  <line x1="296" y1="202" x2="230" y2="252" stroke="#f5f3ec" stroke-width="1.5" marker-end="url(#ah2)"/>
  <rect x="50" y="260" width="300" height="48" rx="8" fill="#1e3a33" stroke="#3ec97e" stroke-width="2"/>
  <text x="200" y="289" text-anchor="middle" fill="#3ec97e" font-size="14" font-weight="700">First responder wins the job</text>

<svg viewBox="0 0 400 528" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Follow-up sequence workflow: quote sent, day 2 check-in, day 7 question, day 14 final message. A reply at any point stops the sequence and you take over." font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="ah3" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0 0L8 4L0 8z" fill="#f5f3ec"/></marker>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#27345c" stroke-width="1"/></pattern>
  </defs>
  <rect width="400" height="528" rx="12" fill="#1a2440"/>
  <rect width="400" height="528" rx="12" fill="url(#grid3)"/>
  <rect x="50" y="24" width="300" height="48" rx="8" fill="#22305a" stroke="#f5f3ec" stroke-width="1.5"/>
  <text x="200" y="53" text-anchor="middle" fill="#f5f3ec" font-size="14" font-weight="600">Quote sent</text>
  <line x1="200" y1="78" x2="200" y2="120" stroke="#f5f3ec" stroke-width="1.5" marker-end="url(#ah3)"/>
  <text x="210" y="104" fill="#3ec97e" font-size="12" font-weight="700">Day 2</text>
  <rect x="50" y="128" width="300" height="48" rx="8" fill="#22305a" stroke="#f5f3ec" stroke-width="1.5"/>
  <text x="200" y="157" text-anchor="middle" fill="#f5f3ec" font-size="14" font-weight="600">Check-in text: "Any questions?"</text>
  <line x1="200" y1="182" x2="200" y2="224" stroke="#f5f3ec" stroke-width="1.5" marker-end="url(#ah3)"/>
  <text x="210" y="208" fill="#3ec97e" font-size="12" font-weight="700">Day 7</text>
  <rect x="50" y="232" width="300" height="48" rx="8" fill="#22305a" stroke="#f5f3ec" stroke-width="1.5"/>
  <text x="200" y="261" text-anchor="middle" fill="#f5f3ec" font-size="14" font-weight="600">A useful question about their job</text>
  <line x1="200" y1="286" x2="200" y2="328" stroke="#f5f3ec" stroke-width="1.5" marker-end="url(#ah3)"/>
  <text x="210" y="312" fill="#3ec97e" font-size="12" font-weight="700">Day 14</text>
  <rect x="50" y="336" width="300" height="48" rx="8" fill="#22305a" stroke="#f5f3ec" stroke-width="1.5"/>
  <text x="200" y="365" text-anchor="middle" fill="#f5f3ec" font-size="14" font-weight="600">Final message: "Closing this out"</text>
  <line x1="200" y1="390" x2="200" y2="432" stroke="#f5f3ec" stroke-width="1.5" marker-end="url(#ah3)"/>
  <text x="210" y="416" fill="#7aaada" font-size="12" font-weight="600">at any step</text>
  <rect x="50" y="440" width="300" height="48" rx="8" fill="#1e3a33" stroke="#3ec97e" stroke-width="2"/>
  <text x="200" y="461" text-anchor="middle" fill="#3ec97e" font-size="13" font-weight="700"><tspan x="200" dy="0">A reply stops the sequence.</tspan><tspan x="200" dy="17">You take over.</tspan></text>
</svg>
